# Source: retail-store/charts/retail-store-cart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-deployment
  labels:
    app: cart
    environment: dev
spec:
  selector:
    matchLabels:
      app: cart
      component: backend
  template:
    metadata:
      labels:
        app: cart
        component: backend
    spec:
      serviceAccountName: cart-sa
      containers:
      - name: cart
        image: "sarthak6700/retail-store-cart:v1"
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: cart-configmap
        resources:
          limits:
            cpu: 500m
            memory: 1024Mi
          requests:
            cpu: 200m
            memory: 512Mi

        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          failureThreshold: 30
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          periodSeconds: 5
---
