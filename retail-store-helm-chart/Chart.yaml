  - name: retail-store-ui
    version: 0.0.1
    repository: "file://charts/ui"
  
  - name: retail-store-dynamodb
    version: 0.0.1
    repository: "file://charts/dynamodb"
  
  - name: retail-store-mysql
    version: 0.0.1
    repository: "file://charts/mysql"
  
  - name: retail-store-postgresql
